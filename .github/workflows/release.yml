name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-24.04, windows-latest]
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6


      - name: Setup Node.js
        uses: actions/setup-node@v6

        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Build target options
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Cargo dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            build-essential \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libdbus-1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Cache local AI model and tokenizer
        id: cache-ai-assets
        uses: actions/cache@v6

        with:
          path: |
            src-tauri/model.onnx
            src-tauri/tokenizer.json
          key: ai-assets-v1

      - name: Download model and tokenizer if not cached
        if: steps.cache-ai-assets.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p src-tauri
          curl -L -o src-tauri/model.onnx https://huggingface.co/Xenova/paraphrase-multilingual-MiniLM-L12-v2/resolve/main/onnx/model_quantized.onnx
          curl -L -o src-tauri/tokenizer.json https://huggingface.co/Xenova/paraphrase-multilingual-MiniLM-L12-v2/resolve/main/tokenizer.json

      - name: Install npm dependencies
        run: npm ci

      - name: Build and release Tauri application
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'vibeNote v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
